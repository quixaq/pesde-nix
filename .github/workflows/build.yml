name: Build
on:
  schedule:
    - cron: "19 7 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
      - name: get nix
        uses: DeterminateSystems/determinate-nix-action@main
      - name: build the flake
        run: |
          nix build .
